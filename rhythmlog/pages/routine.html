<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 루틴 | RhythmLog</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__container">
        <a href="../index.html" class="header__logo">
          <img src="../images/logo_icon.png" alt="" class="header__logo-icon" />
          <span class="header__logo-text">RhythmLog</span>
        </a>
      </div>
    </header>

    <main class="main sub-page-container">
      <h1 class="page-title" style="font-size: 28px;">오늘은 에너지가 낮으니 무리하지 않는 선에서 시작할게요.</h1>
      <p class="page-description">제안된 루틴으로 가벼운 성취감을 경험해보세요.</p>

      <div class="routine-card routine-card--now stagger-item">
        <div class="routine-content" style="flex:1;">
          <span class="routine-badge">NOW (지금 바로 할 일)</span>
          <h3>물 한 잔 마시기</h3>
          <p>가장 장벽이 낮은 작은 행동으로 오늘 하루의 시동을 걸어보세요.</p>
        </div>
        <button class="button-primary btn-sm do-now-btn" style="white-space: nowrap; margin-top: 4px;">시작하기 🚀</button>
      </div>

      <div class="routine-card routine-card--focus stagger-item" style="animation-delay: 0.1s;">
        <div class="routine-content">
          <span class="routine-badge">FOCUS (오늘의 핵심 일)</span>
          <h3>기획안 초안 1장만 쓰기</h3>
          <p>에너지를 집중할 단 하나의 과제입니다. 이것만 해내면 오늘은 성공입니다.</p>
        </div>
      </div>
      <div class="routine-card routine-card--later dropped stagger-item" style="animation-delay: 0.2s;">
        <div class="routine-content">
          <span class="routine-badge">DROP (여유를 가져도 되는 일)</span>
          <h3 style="text-decoration: line-through;">메일 정리 및 회의 준비</h3>
          <p>오늘은 이 일을 하지 않아도 괜찮습니다. 심리적 압박에서 완전히 벗어나세요.</p>
        </div>
      </div>

      <div class="action-area stagger-item" style="flex-direction: row; gap: 16px; animation-delay: 0.3s;">
        <button class="button-secondary button-full" data-href="checkin.html">다시 체크하기</button>
        <button class="button-primary button-full do-start-btn" data-href="reflection.html">이대로 시작하기</button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
