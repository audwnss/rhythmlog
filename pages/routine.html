<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 루틴 | RhythmLog</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__container">
        <a href="../index.html" class="header__logo">
          <img src="../images/logo_icon.png" alt="" class="header__logo-icon" />
          <span class="header__logo-text">RhythmLog</span>
        </a>
      </div>
    </header>

    <main class="main routine-dashboard">
      <!-- Left Column: AI Rhythm Grid -->
      <div class="div-column routine-column--left">
        <div class="column-header">
          <div class="ai-badge">
            <span class="ai-badge__icon">✨</span>
            <span class="ai-badge__text">Gemini가 추천하는 오늘의 루틴</span>
          </div>
          <h2 class="column-title" id="routine-title">오늘의 에너지는 보통이네요.<br>성취감을 느낄 수 있는 리듬을 제안합니다.</h2>
        </div>

        <div class="routine-grid-container" id="routine-container">
          <!-- NOW section spans full width at top of grid -->
          <div class="routine-drop-zone zone--now" id="section-now" data-type="NOW">
            <div class="section-label">NOW</div>
            <div class="routine-card routine-card--now" draggable="true" id="default-now-card">
              <div class="routine-content">
                <h3>물 한 잔 마시기</h3>
                <p>가장 작은 행동으로 시동을 걸어보세요.</p>
              </div>
              <button class="button-primary btn-sm do-now-btn">완료</button>
            </div>
          </div>

          <!-- FOCUS and DROP in a 1:1 grid below -->
          <div class="routine-grid-sub">
            <div class="routine-drop-zone zone--focus" id="section-focus" data-type="FOCUS">
              <div class="section-label">FOCUS</div>
              <div class="empty-drop-state">집중할 일 드래그</div>
            </div>

            <div class="routine-drop-zone zone--drop" id="section-drop" data-type="DROP">
              <div class="section-label">DROP</div>
              <div class="empty-drop-state">미룰 일 드래그</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Brain Dump -->
      <div class="div-column routine-column--right">
        <div class="column-header">
          <h2 class="column-title">Brain Dump</h2>
          <p class="column-desc">머릿속 생각들을 모두 쏟아내세요.</p>
        </div>

        <div class="dump-input-wrapper">
          <input type="text" id="dump-input" placeholder="할 일 적고 Enter" class="one-thing-input">
        </div>

        <div class="routine-drop-zone dump-drop-zone" id="dump-list-zone" data-type="DUMP">
          <ul id="dump-list" class="dump-list">
            <li class="dump-item" draggable="true">기획안 초안 1장 쓰기</li>
            <li class="dump-item" draggable="true">팀 회의록 정리</li>
            <li class="dump-item" draggable="true">메일 확인 및 답변</li>
            <li class="dump-item" draggable="true">운동(스쿼트 30회)</li>
            <li class="dump-item" draggable="true">책 10페이지 읽기</li>
          </ul>
        </div>
      </div>

      <div class="action-area dash-actions">
        <button class="button-secondary" data-href="checkin.html">다시 체크</button>
        <button class="button-primary do-ai-analyze-btn" id="start-ai-btn">AI 리듬 최적화하기</button>
      </div>
    </main>

    <div class="ai-loading-overlay" id="ai-loading-overlay">
      <div class="ai-loader">
        <div class="ai-loader__orb">
          <div class="ai-loader__sparkle"></div>
        </div>
        <p class="ai-loader__text">Gemini 3.1이 최적의 리듬을 설계하고 있습니다...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
